app-id: com.budgetwithbuckets.Buckets
base: org.electronjs.Electron2.BaseApp
base-version: '23.08'
command: buckets.sh
finish-args:
- --device=dri
- --filesystem=xdg-documents
- --share=ipc
- --share=network
- --socket=x11
modules:
- build-commands:
  - install -Dm 644 meta/com.budgetwithbuckets.Buckets.desktop -t /app/share/applications
  - install -Dm 644 meta/com.budgetwithbuckets.Buckets.png -t /app/share/icons/hicolor/512x512/apps
  - install -Dm 644 meta/com.budgetwithbuckets.Buckets.appdata.xml /app/share/metainfo/com.budgetwithbuckets.Buckets.metainfo.xml
  - install -Dm 755 buckets.sh /app/bin/buckets.sh
  - cp -r buckets /app/buckets
  buildsystem: simple
  name: buckets
  sources:
  - dest: buckets
    only-arches:
    - x86_64
    sha512: 300f391583e58a70ea88955b5c1242e694d99dc6080e86c9ea06c5d40a12c87f9d35fdfefcc9b18ff5950aca4bb4bc0b9b7b656143ebc56c918b9600da169610
    type: archive
    url: https://github.com/buckets/desktop-beta/releases/download/v0.81.0/Buckets-Beta-linux-latest-amd64-0.81.0.tar.gz
  - dest: buckets
    only-arches:
    - aarch64
    sha512: 32677f48635e2d9cc41e96e574cfa9167c3ffe1f8f2d27165b1d4382ff212589fc3da723f5bdefe0c0efb08c3ec2b99cdb47b1698a1fee1d8c136b2e754850ae
    type: archive
    url: https://github.com/buckets/desktop-beta/releases/download/v0.81.0/Buckets-Beta-linux-latest-arm64-0.81.0.tar.gz
  - dest: meta
    sha512: 2546008c037bcd888f9da6e0eda3a057983196a1add244f878fad23b179f1684833b3b4717653b64ed799425fcdf11a998a43e10b3d4090880152f34078f8fb4
    strip-components: 0
    type: archive
    url: https://github.com/buckets/desktop-beta/releases/download/v0.81.0/Buckets-Beta-flatpakdata-v0.81.0.tgz
  - commands:
    - TMPDIR="$XDG_RUNTIME_DIR/app/$FLATPAK_ID" zypak-wrapper /app/buckets/bucketsbeta
    dest-filename: buckets.sh
    type: script
runtime: org.freedesktop.Platform
runtime-version: '23.08'
sdk: org.freedesktop.Sdk
separate-locales: false
tags:
- proprietary

