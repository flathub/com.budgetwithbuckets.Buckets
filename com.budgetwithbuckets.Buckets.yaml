app-id: com.budgetwithbuckets.Buckets
base: org.electronjs.Electron2.BaseApp
base-version: '23.08'
command: buckets.sh
finish-args:
- --device=dri
- --filesystem=xdg-documents
- --share=ipc
- --share=network
- --socket=x11
modules:
- build-commands:
  - install -Dm 644 meta/com.budgetwithbuckets.Buckets.desktop -t /app/share/applications
  - install -Dm 644 meta/com.budgetwithbuckets.Buckets.png -t /app/share/icons/hicolor/512x512/apps
  - install -Dm 644 meta/com.budgetwithbuckets.Buckets.appdata.xml /app/share/metainfo/com.budgetwithbuckets.Buckets.metainfo.xml
  - install -Dm 755 buckets.sh /app/bin/buckets.sh
  - cp -r buckets /app/buckets
  buildsystem: simple
  name: buckets
  sources:
  - dest: buckets
    only-arches:
    - x86_64
    sha512: c0c47d71d7577e58fb389b2b13df3ebb47cf4c72a7be9fccf50041b2b595843cfbbdae19727e46de4358ec0555c248aeea771c50891a293ed28f02a6f676c1e4
    type: archive
    url: https://github.com/buckets/desktop-beta/releases/download/v0.81.1/Buckets-Beta-linux-latest-amd64-0.81.1.tar.gz
  - dest: buckets
    only-arches:
    - aarch64
    sha512: a34aa644f3bc41c5c245c8eba2091e01eb9a6970d7181fba20bec7c52a47a950410dd559259395d7740b7e12593b08939b93f3ad5f977f7a6aa5faa6793a6380
    type: archive
    url: https://github.com/buckets/desktop-beta/releases/download/v0.81.1/Buckets-Beta-linux-latest-arm64-0.81.1.tar.gz
  - dest: meta
    sha512: 9a7b2870bfc6d08a916eb86a31d92c790b0775f4952cc6218c21ff090cd97dbd5db7bc2619113a44d31f7428384c044c6416e4b62394d8b2ff0939a75ec46447
    strip-components: 0
    type: archive
    url: https://github.com/buckets/desktop-beta/releases/download/v0.81.1/Buckets-Beta-flatpakdata-v0.81.1.tgz
  - commands:
    - TMPDIR="$XDG_RUNTIME_DIR/app/$FLATPAK_ID" zypak-wrapper /app/buckets/bucketsbeta
    dest-filename: buckets.sh
    type: script
runtime: org.freedesktop.Platform
runtime-version: '23.08'
sdk: org.freedesktop.Sdk
separate-locales: false
tags:
- proprietary

